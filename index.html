<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f4c75" />
  <meta name="description" content="Seguimiento de Procesos de Compra - Farmacia Hospital Municipal La Portada" />
  <title>Seguimiento Compras · Farmacia</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --azul-oscuro: #0f4c75;
      --azul-medio: #1b6ca8;
      --azul-claro: #e8f4fd;
      --verde: #2d6a4f;
      --verde-claro: #d8f3dc;
      --amarillo: #b5820a;
      --amarillo-claro: #fff3cd;
      --rojo: #c0392b;
      --rojo-claro: #fdecea;
      --gris-oscuro: #1a1a2e;
      --gris-medio: #4a5568;
      --gris-claro: #f7f9fc;
      --blanco: #ffffff;
      --borde: #dde3ec;
      --sombra: 0 2px 12px rgba(15,76,117,0.10);
      --sombra-hover: 0 6px 24px rgba(15,76,117,0.18);
      --radio: 10px;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--gris-claro);
      color: var(--gris-oscuro);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--azul-oscuro);
      color: white;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .header-sub {
      font-size: 11px;
      opacity: 0.65;
      font-weight: 300;
    }
    .btn-nueva {
      background: #fff;
      color: var(--azul-oscuro);
      border: none;
      padding: 8px 16px;
      border-radius: var(--radio);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-nueva:hover { background: var(--azul-claro); }

    /* STATS BAR */
    .stats-bar {
      background: white;
      border-bottom: 1px solid var(--borde);
      padding: 12px 20px;
      display: flex;
      gap: 24px;
      overflow-x: auto;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .stat-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .stat-label { font-size: 12px; color: var(--gris-medio); }
    .stat-num { font-size: 16px; font-weight: 600; font-family: var(--font-mono); }

    /* FILTROS */
    .filtros {
      padding: 14px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filtro-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--borde);
      background: white;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--gris-medio);
    }
    .filtro-btn.activo {
      background: var(--azul-oscuro);
      color: white;
      border-color: var(--azul-oscuro);
    }

    /* LISTA DE SOLICITUDES */
    .lista-container {
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-solicitud {
      background: white;
      border-radius: var(--radio);
      border: 1.5px solid var(--borde);
      box-shadow: var(--sombra);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }
    .card-solicitud:hover {
      box-shadow: var(--sombra-hover);
      border-color: var(--azul-medio);
      transform: translateY(-1px);
    }

    .card-top {
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-info { flex: 1; }
    .card-codigo {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--azul-medio);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 14px;
      font-weight: 500;
      color: var(--gris-oscuro);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .meta-item {
      font-size: 11px;
      color: var(--gris-medio);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .badge-tipo {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.5px;
    }
    .badge-ANPE { background: #e3f2fd; color: #1565c0; }
    .badge-Menor { background: #f3e5f5; color: #6a1b9a; }
    .badge-Licitación { background: #e8f5e9; color: #2e7d32; }
    .badge-Excepción { background: #fff8e1; color: #e65100; }
    .badge-Directa { background: #fce4ec; color: #880e4f; }

    /* SEMAFORO */
    .semaforo {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .dias-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .dias-verde { background: var(--verde-claro); color: var(--verde); }
    .dias-amarillo { background: var(--amarillo-claro); color: var(--amarillo); }
    .dias-rojo { background: var(--rojo-claro); color: var(--rojo); }
    .estado-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .estado-en_proceso { background: #e3f2fd; color: #1565c0; }
    .estado-detenido { background: var(--rojo-claro); color: var(--rojo); }
    .estado-completado { background: var(--verde-claro); color: var(--verde); }

    /* PROGRESO ETAPAS */
    .card-progreso {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--borde);
      background: #fafbfd;
    }
    .etapas-track {
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .etapa-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 60px;
    }
    .etapa-circulo {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      border: 2px solid var(--borde);
      background: white;
      color: var(--gris-medio);
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .etapa-circulo.completada {
      background: var(--azul-oscuro);
      border-color: var(--azul-oscuro);
      color: white;
    }
    .etapa-circulo.actual {
      background: var(--azul-medio);
      border-color: var(--azul-medio);
      color: white;
      box-shadow: 0 0 0 3px rgba(27,108,168,0.2);
    }
    .etapa-nombre {
      font-size: 9px;
      color: var(--gris-medio);
      text-align: center;
      line-height: 1.2;
      max-width: 56px;
    }
    .etapa-nombre.actual { color: var(--azul-medio); font-weight: 600; }
    .etapa-nombre.completada { color: var(--azul-oscuro); }
    .etapa-linea {
      flex: 1;
      height: 2px;
      background: var(--borde);
      margin-bottom: 14px;
      min-width: 8px;
    }
    .etapa-linea.completada { background: var(--azul-oscuro); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gris-medio);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--gris-medio);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--borde);
      border-top-color: var(--azul-medio);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,76,117,0.5);
      z-index: 200;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-overlay.activo { display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; }
    .modal {
      background: white;
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .modal-header {
      background: var(--azul-oscuro);
      color: white;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-titulo { font-size: 16px; font-weight: 600; }
    .modal-cerrar {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.7;
      line-height: 1;
      padding: 0 4px;
    }
    .modal-cerrar:hover { opacity: 1; }
    .modal-body { padding: 20px; }

    .form-grupo {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gris-medio);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--borde);
      border-radius: var(--radio);
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--gris-oscuro);
      background: white;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--azul-medio);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-guardar {
      width: 100%;
      padding: 12px;
      background: var(--azul-oscuro);
      color: white;
      border: none;
      border-radius: var(--radio);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-guardar:hover { background: var(--azul-medio); }
    .btn-guardar:disabled { opacity: 0.6; cursor: not-allowed; }

    /* MODAL DETALLE */
    .detalle-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--borde);
    }
    .detalle-codigo {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--azul-medio);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .detalle-desc {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .detalle-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .detalle-etapas {
      padding: 16px 20px;
      border-bottom: 1px solid var(--borde);
    }
    .detalle-etapas-titulo {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gris-medio);
      margin-bottom: 12px;
    }
    .etapa-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--borde);
      cursor: pointer;
      transition: all 0.2s;
      align-items: flex-start;
    }
    .etapa-row:hover { border-color: var(--azul-medio); background: var(--azul-claro); }
    .etapa-row.completada-row { background: #f0f7ff; border-color: #b3d4f5; }
    .etapa-row.actual-row { border-color: var(--azul-medio); background: var(--azul-claro); }
    .etapa-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--borde);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--gris-medio);
      flex-shrink: 0;
    }
    .etapa-num.ok { background: var(--azul-oscuro); color: white; }
    .etapa-num.now { background: var(--azul-medio); color: white; }
    .etapa-row-info { flex: 1; }
    .etapa-row-nombre { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .etapa-row-detalle { font-size: 11px; color: var(--gris-medio); }
    .etapa-row-fecha {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--azul-medio);
      white-space: nowrap;
    }

    .detalle-historial {
      padding: 16px 20px;
      border-bottom: 1px solid var(--borde);
    }
    .historial-titulo {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gris-medio);
      margin-bottom: 12px;
    }
    .historial-item {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--borde);
    }
    .historial-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .historial-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--azul-medio);
      margin-top: 5px;
      flex-shrink: 0;
    }
    .historial-content { flex: 1; }
    .historial-etapa { font-size: 12px; font-weight: 600; color: var(--azul-oscuro); }
    .historial-unidad { font-size: 11px; color: var(--gris-medio); }
    .historial-comentario { font-size: 12px; color: var(--gris-oscuro); margin-top: 2px; }
    .historial-fecha {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--gris-medio);
      white-space: nowrap;
    }

    .detalle-avanzar {
      padding: 16px 20px;
    }
    .avanzar-titulo {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gris-medio);
      margin-bottom: 12px;
    }

    /* MODAL CONFIRMACION ELIMINAR */
    .modal-confirmar {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,76,117,0.6);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-confirmar.activo { display: flex; }
    .confirmar-box {
      background: white;
      border-radius: 14px;
      width: 100%;
      max-width: 380px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: popIn 0.2s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .confirmar-top {
      background: var(--rojo);
      padding: 20px;
      text-align: center;
      color: white;
    }
    .confirmar-icono { font-size: 36px; margin-bottom: 8px; }
    .confirmar-titulo { font-size: 17px; font-weight: 700; }
    .confirmar-body { padding: 20px; }
    .confirmar-texto {
      font-size: 14px;
      color: var(--gris-medio);
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .confirmar-codigo {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--rojo);
      text-align: center;
      background: var(--rojo-claro);
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .confirmar-botones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-cancelar-eliminar {
      padding: 11px;
      border-radius: var(--radio);
      border: 1.5px solid var(--borde);
      background: white;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--gris-medio);
      transition: all 0.2s;
    }
    .btn-cancelar-eliminar:hover { background: var(--gris-claro); }
    .btn-confirmar-eliminar {
      padding: 11px;
      border-radius: var(--radio);
      border: none;
      background: var(--rojo);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: all 0.2s;
    }
    .btn-confirmar-eliminar:hover { background: #a93226; }
    .btn-eliminar-solicitud {
      width: 100%;
      padding: 10px;
      border-radius: var(--radio);
      border: 1.5px solid var(--rojo);
      background: white;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--rojo);
      transition: all 0.2s;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-eliminar-solicitud:hover { background: var(--rojo-claro); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--gris-oscuro);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.exito { background: var(--verde); }
    .toast.error { background: var(--rojo); }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .stats-bar { gap: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">💊</div>
    <div>
      <div class="header-title">Seguimiento de Compras</div>
      <div class="header-sub">Farmacia · Hospital Municipal La Portada</div>
    </div>
  </div>
  <button class="btn-nueva" onclick="abrirModalNueva()">
    <span>＋</span> Nueva Solicitud
  </button>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-dot" style="background:#1565c0"></div>
    <span class="stat-label">En proceso</span>
    <span class="stat-num" id="statProceso">—</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#c0392b"></div>
    <span class="stat-label">Detenidas</span>
    <span class="stat-num" id="statDetenido">—</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#2d6a4f"></div>
    <span class="stat-label">Completadas</span>
    <span class="stat-num" id="statCompletado">—</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#b5820a"></div>
    <span class="stat-label">Total</span>
    <span class="stat-num" id="statTotal">—</span>
  </div>
</div>

<div class="filtros">
  <button class="filtro-btn activo" onclick="filtrar('todos', this)">Todos</button>
  <button class="filtro-btn" onclick="filtrar('en_proceso', this)">En proceso</button>
  <button class="filtro-btn" onclick="filtrar('detenido', this)">Detenidos</button>
  <button class="filtro-btn" onclick="filtrar('completado', this)">Completados</button>
</div>

<div class="lista-container" id="listaContainer">
  <div class="loading">
    <div class="spinner"></div>
    Cargando solicitudes...
  </div>
</div>

<!-- MODAL NUEVA SOLICITUD -->
<div class="modal-overlay" id="modalNueva">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo">Nueva Solicitud de Compra</span>
      <button class="modal-cerrar" onclick="cerrarModalNueva()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grupo">
        <label class="form-label">Descripción / Objeto de compra</label>
        <input type="text" class="form-input" id="inputDesc" placeholder="Ej: Medicamentos LINAME Trimestre 3" />
      </div>
      <div class="form-row">
        <div class="form-grupo">
          <label class="form-label">Tipo de contratación</label>
          <select class="form-select" id="inputTipo">
            <option value="Menor">Contratación Menor (≤ Bs 50.000)</option>
            <option value="ANPE">ANPE (Bs 50.001 – 1.000.000)</option>
            <option value="Licitación">Licitación Pública (> Bs 1.000.000)</option>
            <option value="Excepción">Contratación por Excepción</option>
            <option value="Directa">Contratación Directa</option>
          </select>
        </div>
        <div class="form-grupo">
          <label class="form-label">Monto estimado (Bs)</label>
          <input type="number" class="form-input" id="inputMonto" placeholder="0.00" />
        </div>
      </div>
      <div class="form-grupo">
        <label class="form-label">Observación inicial</label>
        <textarea class="form-textarea" id="inputObs" placeholder="Notas, referencias, urgencia..."></textarea>
      </div>
      <div class="form-grupo">
        <label class="form-label">Registrado por</label>
        <select class="form-select" id="inputUnidad">
          <option value="Farmacia">Farmacia</option>
          <option value="Administrativa">Unidad Administrativa</option>
          <option value="Contabilidad">Contabilidad</option>
          <option value="Dirección">Dirección</option>
        </select>
      </div>
      <button class="btn-guardar" id="btnGuardar" onclick="guardarSolicitud()">
        Crear Solicitud
      </button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modalDetalle">
  <div class="modal" id="modalDetalleContent">
    <!-- se llena dinámicamente -->
  </div>
</div>

<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="modal-confirmar" id="modalConfirmarEliminar">
  <div class="confirmar-box">
    <div class="confirmar-top">
      <div class="confirmar-icono">🗑️</div>
      <div class="confirmar-titulo">¿Eliminar este proceso?</div>
    </div>
    <div class="confirmar-body">
      <p class="confirmar-texto">Esta acción es <strong>irreversible</strong>. Se eliminará permanentemente el proceso:</p>
      <div class="confirmar-codigo" id="confirmarCodigo">—</div>
      <div class="confirmar-botones">
        <button class="btn-cancelar-eliminar" onclick="cerrarConfirmarEliminar()">Cancelar</button>
        <button class="btn-confirmar-eliminar" id="btnConfirmarEliminar" onclick="ejecutarEliminar()">Sí, eliminar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDPBTLGbNnfq-YIgKUloHM6RWykWn2YhYE",
    authDomain: "seguimiento-compras-649b1.firebaseapp.com",
    projectId: "seguimiento-compras-649b1",
    storageBucket: "seguimiento-compras-649b1.firebasestorage.app",
    messagingSenderId: "782262479428",
    appId: "1:782262479428:web:6c00285d808f8fc1882a11"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ETAPAS DEL PROCESO
  const ETAPAS = [
    { id: 'farmacia',       nombre: 'Solicitud\nFarmacia',    responsable: 'Farmacia' },
    { id: 'administrativa', nombre: 'Unidad\nAdm.',           responsable: 'Administrativa' },
    { id: 'dbc',            nombre: 'Elabor.\nDBC',           responsable: 'Administrativa' },
    { id: 'sicoes',         nombre: 'Publicación\nSICOES',    responsable: 'Administrativa' },
    { id: 'evaluacion',     nombre: 'Evaluación\nPropuestas', responsable: 'Comisión' },
    { id: 'adjudicacion',   nombre: 'Adjudicación',           responsable: 'RPC/MAE' },
    { id: 'contrato',       nombre: 'Contrato/\nOrden',       responsable: 'Jurídica' },
    { id: 'recepcion',      nombre: 'Recepción\nFarmacia',    responsable: 'Farmacia' },
  ];

  let todasLasSolicitudes = [];
  let filtroActual = 'todos';
  let solicitudActual = null;

  // Expose functions globally
  window.abrirModalNueva = abrirModalNueva;
  window.cerrarModalNueva = cerrarModalNueva;
  window.guardarSolicitud = guardarSolicitud;
  window.filtrar = filtrar;
  window.abrirDetalle = abrirDetalle;
  window.cerrarDetalle = cerrarDetalle;
  window.avanzarEtapa = avanzarEtapa;
  window.marcarDetenida = marcarDetenida;
  window.marcarCompletada = marcarCompletada;
  window.pedirConfirmarEliminar = pedirConfirmarEliminar;
  window.cerrarConfirmarEliminar = cerrarConfirmarEliminar;
  window.ejecutarEliminar = ejecutarEliminar;

  // ESCUCHAR CAMBIOS EN TIEMPO REAL
  const q = query(collection(db, 'solicitudes'), orderBy('fechaCreacion', 'desc'));
  onSnapshot(q, (snapshot) => {
    todasLasSolicitudes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderizarLista();
    actualizarStats();
  });

  function actualizarStats() {
    const en_proceso = todasLasSolicitudes.filter(s => s.estado === 'en_proceso').length;
    const detenido = todasLasSolicitudes.filter(s => s.estado === 'detenido').length;
    const completado = todasLasSolicitudes.filter(s => s.estado === 'completado').length;
    document.getElementById('statProceso').textContent = en_proceso;
    document.getElementById('statDetenido').textContent = detenido;
    document.getElementById('statCompletado').textContent = completado;
    document.getElementById('statTotal').textContent = todasLasSolicitudes.length;
  }

  function filtrar(filtro, btn) {
    filtroActual = filtro;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
    renderizarLista();
  }

  function renderizarLista() {
    const container = document.getElementById('listaContainer');
    let lista = todasLasSolicitudes;
    if (filtroActual !== 'todos') {
      lista = lista.filter(s => s.estado === filtroActual);
    }
    if (lista.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">Sin solicitudes</div>
          <div class="empty-sub">Crea la primera solicitud con el botón de arriba</div>
        </div>`;
      return;
    }
    container.innerHTML = lista.map(s => cardHTML(s)).join('');
  }

  function cardHTML(s) {
    const idxActual = ETAPAS.findIndex(e => e.id === s.etapaActual);
    const dias = diasTranscurridos(s.fechaCreacion);
    const clasesDias = dias <= 5 ? 'dias-verde' : dias <= 15 ? 'dias-amarillo' : 'dias-rojo';
    const fecha = formatFecha(s.fechaCreacion);

    const etapasHTML = ETAPAS.map((e, i) => {
      const completada = i < idxActual;
      const actual = i === idxActual;
      const linea = i < ETAPAS.length - 1
        ? `<div class="etapa-linea ${completada ? 'completada' : ''}"></div>`
        : '';
      return `
        <div class="etapa-item">
          <div class="etapa-circulo ${completada ? 'completada' : actual ? 'actual' : ''}">
            ${completada ? '✓' : i + 1}
          </div>
          <div class="etapa-nombre ${completada ? 'completada' : actual ? 'actual' : ''}">${e.nombre}</div>
        </div>
        ${linea}`;
    }).join('');

    return `
      <div class="card-solicitud" onclick="abrirDetalle('${s.id}')">
        <div class="card-top">
          <div class="card-info">
            <div class="card-codigo">${s.codigo}</div>
            <div class="card-desc">${s.descripcion}</div>
            <div class="card-meta">
              <span class="badge-tipo badge-${s.tipo}">${s.tipo}</span>
              ${s.monto ? `<span class="meta-item">💰 Bs ${Number(s.monto).toLocaleString()}</span>` : ''}
              <span class="meta-item">📅 ${fecha}</span>
            </div>
          </div>
          <div class="semaforo">
            <span class="dias-badge ${clasesDias}">${dias}d</span>
            <span class="estado-badge estado-${s.estado}">${estadoLabel(s.estado)}</span>
          </div>
        </div>
        <div class="card-progreso">
          <div class="etapas-track">${etapasHTML}</div>
        </div>
      </div>`;
  }

  function abrirDetalle(id) {
    solicitudActual = todasLasSolicitudes.find(s => s.id === id);
    if (!solicitudActual) return;
    const s = solicitudActual;
    const idxActual = ETAPAS.findIndex(e => e.id === s.etapaActual);
    const dias = diasTranscurridos(s.fechaCreacion);
    const clasesDias = dias <= 5 ? 'dias-verde' : dias <= 15 ? 'dias-amarillo' : 'dias-rojo';

    const etapasHTML = ETAPAS.map((e, i) => {
      const completada = i < idxActual;
      const actual = i === idxActual;
      const entrada = s.historial?.find(h => h.etapa === e.id);
      return `
        <div class="etapa-row ${completada ? 'completada-row' : actual ? 'actual-row' : ''}">
          <div class="etapa-num ${completada ? 'ok' : actual ? 'now' : ''}">${completada ? '✓' : i+1}</div>
          <div class="etapa-row-info">
            <div class="etapa-row-nombre">${e.nombre.replace('\n', ' ')}</div>
            <div class="etapa-row-detalle">${e.responsable}${entrada ? ' · ' + (entrada.comentario || '') : ''}</div>
          </div>
          ${entrada ? `<div class="etapa-row-fecha">${formatFechaCorta(entrada.fecha)}</div>` : ''}
        </div>`;
    }).join('');

    const historialHTML = (s.historial || []).slice().reverse().map(h => `
      <div class="historial-item">
        <div class="historial-dot"></div>
        <div class="historial-content">
          <div class="historial-etapa">${ETAPAS.find(e=>e.id===h.etapa)?.nombre.replace('\n',' ') || h.etapa}</div>
          <div class="historial-unidad">${h.unidad}</div>
          ${h.comentario ? `<div class="historial-comentario">${h.comentario}</div>` : ''}
        </div>
        <div class="historial-fecha">${formatFechaCorta(h.fecha)}</div>
      </div>`).join('');

    const puedeAvanzar = s.estado === 'en_proceso' && idxActual < ETAPAS.length - 1;
    const puedeCompletar = s.estado === 'en_proceso' && idxActual === ETAPAS.length - 1;

    document.getElementById('modalDetalleContent').innerHTML = `
      <div class="modal-header">
        <span class="modal-titulo">Detalle de Solicitud</span>
        <button class="modal-cerrar" onclick="cerrarDetalle()">×</button>
      </div>
      <div class="detalle-header">
        <div class="detalle-codigo">${s.codigo}</div>
        <div class="detalle-desc">${s.descripcion}</div>
        <div class="detalle-meta">
          <span class="badge-tipo badge-${s.tipo}">${s.tipo}</span>
          ${s.monto ? `<span class="meta-item">💰 Bs ${Number(s.monto).toLocaleString()}</span>` : ''}
          <span class="dias-badge ${clasesDias}">${dias} días transcurridos</span>
          <span class="estado-badge estado-${s.estado}">${estadoLabel(s.estado)}</span>
        </div>
      </div>
      <div class="detalle-etapas">
        <div class="detalle-etapas-titulo">Etapas del proceso</div>
        ${etapasHTML}
      </div>
      ${historialHTML ? `
      <div class="detalle-historial">
        <div class="historial-titulo">Historial de actualizaciones</div>
        ${historialHTML}
      </div>` : ''}
      <div class="detalle-avanzar">
        <div class="avanzar-titulo">Actualizar estado</div>
        <div class="form-grupo">
          <label class="form-label">Unidad que actualiza</label>
          <select class="form-select" id="avanzarUnidad">
            <option value="Farmacia">Farmacia</option>
            <option value="Administrativa">Unidad Administrativa</option>
            <option value="Contabilidad">Contabilidad</option>
            <option value="Dirección">Dirección</option>
            <option value="Jurídica">Jurídica</option>
            <option value="Comisión">Comisión de Calificación</option>
          </select>
        </div>
        <div class="form-grupo">
          <label class="form-label">Comentario / Observación</label>
          <textarea class="form-textarea" id="avanzarComentario" placeholder="Qué pasó, qué se hizo, qué falta..."></textarea>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${puedeAvanzar ? `
          <button class="btn-guardar" style="flex:2" onclick="avanzarEtapa('${s.id}')">
            ✅ Avanzar a: ${ETAPAS[idxActual+1]?.nombre.replace('\n',' ')}
          </button>` : ''}
          ${puedeCompletar ? `
          <button class="btn-guardar" style="flex:2;background:var(--verde)" onclick="marcarCompletada('${s.id}')">
            🎉 Marcar como Completada
          </button>` : ''}
          ${s.estado === 'en_proceso' ? `
          <button class="btn-guardar" style="flex:1;background:var(--rojo)" onclick="marcarDetenida('${s.id}')">
            ⏸ Detener
          </button>` : ''}
          ${s.estado === 'detenido' ? `
          <button class="btn-guardar" style="background:var(--azul-medio)" onclick="reanudarProceso('${s.id}')">
            ▶ Reanudar proceso
          </button>` : ''}
        </div>
        <button class="btn-eliminar-solicitud" onclick="pedirConfirmarEliminar('${s.id}', '${s.codigo}')">
          🗑️ Eliminar este proceso de compra
        </button>
      </div>`;

    document.getElementById('modalDetalle').classList.add('activo');
    window.reanudarProceso = reanudarProceso;
  }

  function cerrarDetalle() {
    document.getElementById('modalDetalle').classList.remove('activo');
    solicitudActual = null;
  }

  async function avanzarEtapa(id) {
    const s = todasLasSolicitudes.find(x => x.id === id);
    if (!s) return;
    const idxActual = ETAPAS.findIndex(e => e.id === s.etapaActual);
    const siguienteEtapa = ETAPAS[idxActual + 1];
    if (!siguienteEtapa) return;

    const unidad = document.getElementById('avanzarUnidad').value;
    const comentario = document.getElementById('avanzarComentario').value.trim();

    const nuevoHistorial = [...(s.historial || []), {
      etapa: siguienteEtapa.id,
      unidad,
      comentario,
      fecha: new Date().toISOString()
    }];

    try {
      await updateDoc(doc(db, 'solicitudes', id), {
        etapaActual: siguienteEtapa.id,
        historial: nuevoHistorial,
        ultimaActualizacion: serverTimestamp()
      });
      cerrarDetalle();
      mostrarToast('✅ Etapa avanzada correctamente', 'exito');
    } catch(e) {
      mostrarToast('Error al actualizar', 'error');
    }
  }

  async function marcarDetenida(id) {
    const unidad = document.getElementById('avanzarUnidad').value;
    const comentario = document.getElementById('avanzarComentario').value.trim();
    const s = todasLasSolicitudes.find(x => x.id === id);
    const nuevoHistorial = [...(s.historial || []), {
      etapa: 'detenido',
      unidad,
      comentario: '⏸ PROCESO DETENIDO. ' + comentario,
      fecha: new Date().toISOString()
    }];
    try {
      await updateDoc(doc(db, 'solicitudes', id), {
        estado: 'detenido',
        historial: nuevoHistorial,
        ultimaActualizacion: serverTimestamp()
      });
      cerrarDetalle();
      mostrarToast('⏸ Proceso marcado como detenido', 'error');
    } catch(e) {
      mostrarToast('Error al actualizar', 'error');
    }
  }

  async function reanudarProceso(id) {
    const unidad = document.getElementById('avanzarUnidad')?.value || 'Farmacia';
    const comentario = document.getElementById('avanzarComentario')?.value.trim() || '';
    const s = todasLasSolicitudes.find(x => x.id === id);
    const nuevoHistorial = [...(s.historial || []), {
      etapa: s.etapaActual,
      unidad,
      comentario: '▶ PROCESO REANUDADO. ' + comentario,
      fecha: new Date().toISOString()
    }];
    try {
      await updateDoc(doc(db, 'solicitudes', id), {
        estado: 'en_proceso',
        historial: nuevoHistorial,
        ultimaActualizacion: serverTimestamp()
      });
      cerrarDetalle();
      mostrarToast('▶ Proceso reanudado', 'exito');
    } catch(e) {
      mostrarToast('Error al actualizar', 'error');
    }
  }

  async function marcarCompletada(id) {
    const unidad = document.getElementById('avanzarUnidad').value;
    const comentario = document.getElementById('avanzarComentario').value.trim();
    const s = todasLasSolicitudes.find(x => x.id === id);
    const nuevoHistorial = [...(s.historial || []), {
      etapa: 'completado',
      unidad,
      comentario: '🎉 PROCESO COMPLETADO. ' + comentario,
      fecha: new Date().toISOString()
    }];
    try {
      await updateDoc(doc(db, 'solicitudes', id), {
        estado: 'completado',
        historial: nuevoHistorial,
        ultimaActualizacion: serverTimestamp()
      });
      cerrarDetalle();
      mostrarToast('🎉 Proceso completado exitosamente', 'exito');
    } catch(e) {
      mostrarToast('Error al actualizar', 'error');
    }
  }

  function abrirModalNueva() {
    document.getElementById('modalNueva').classList.add('activo');
  }
  function cerrarModalNueva() {
    document.getElementById('modalNueva').classList.remove('activo');
  }

  async function guardarSolicitud() {
    const desc = document.getElementById('inputDesc').value.trim();
    const tipo = document.getElementById('inputTipo').value;
    const monto = document.getElementById('inputMonto').value;
    const obs = document.getElementById('inputObs').value.trim();
    const unidad = document.getElementById('inputUnidad').value;

    if (!desc) { mostrarToast('Ingresa una descripción', 'error'); return; }

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    const codigo = generarCodigo(tipo);

    try {
      await addDoc(collection(db, 'solicitudes'), {
        codigo,
        descripcion: desc,
        tipo,
        monto: monto || null,
        estado: 'en_proceso',
        etapaActual: 'farmacia',
        fechaCreacion: new Date().toISOString(),
        ultimaActualizacion: serverTimestamp(),
        historial: [{
          etapa: 'farmacia',
          unidad,
          comentario: obs || 'Solicitud creada',
          fecha: new Date().toISOString()
        }]
      });
      cerrarModalNueva();
      document.getElementById('inputDesc').value = '';
      document.getElementById('inputMonto').value = '';
      document.getElementById('inputObs').value = '';
      mostrarToast('✅ Solicitud creada correctamente', 'exito');
    } catch(e) {
      mostrarToast('Error al guardar: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Crear Solicitud';
    }
  }

  let idParaEliminar = null;

  function pedirConfirmarEliminar(id, codigo) {
    idParaEliminar = id;
    document.getElementById('confirmarCodigo').textContent = codigo;
    document.getElementById('modalConfirmarEliminar').classList.add('activo');
  }

  function cerrarConfirmarEliminar() {
    idParaEliminar = null;
    document.getElementById('modalConfirmarEliminar').classList.remove('activo');
  }

  async function ejecutarEliminar() {
    if (!idParaEliminar) return;
    const btn = document.getElementById('btnConfirmarEliminar');
    btn.disabled = true;
    btn.textContent = 'Eliminando...';
    try {
      await deleteDoc(doc(db, 'solicitudes', idParaEliminar));
      cerrarConfirmarEliminar();
      cerrarDetalle();
      mostrarToast('🗑️ Proceso eliminado correctamente', 'error');
    } catch(e) {
      mostrarToast('Error al eliminar: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sí, eliminar';
    }
  }

  function generarCodigo(tipo) {
    const now = new Date();
    const año = now.getFullYear();
    const mes = String(now.getMonth()+1).padStart(2,'0');
    const rand = String(Math.floor(Math.random()*900)+100);
    return `${año}-${mes}-${tipo.substring(0,3).toUpperCase()}-${rand}`;
  }

  function diasTranscurridos(fechaISO) {
    if (!fechaISO) return 0;
    const inicio = new Date(fechaISO);
    const ahora = new Date();
    return Math.floor((ahora - inicio) / (1000*60*60*24));
  }

  function formatFecha(fechaISO) {
    if (!fechaISO) return '—';
    const d = new Date(fechaISO);
    return d.toLocaleDateString('es-BO', { day:'2-digit', month:'short', year:'numeric' });
  }

  function formatFechaCorta(fechaISO) {
    if (!fechaISO) return '';
    const d = new Date(fechaISO);
    return d.toLocaleDateString('es-BO', { day:'2-digit', month:'short' }) + ' ' +
      d.toLocaleTimeString('es-BO', { hour:'2-digit', minute:'2-digit' });
  }

  function estadoLabel(estado) {
    return { en_proceso: 'En proceso', detenido: 'Detenido', completado: 'Completado' }[estado] || estado;
  }

  function mostrarToast(msg, tipo='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + tipo;
    setTimeout(() => t.className = 'toast', 3000);
  }

  // Cerrar modales al hacer click fuera
  document.getElementById('modalNueva').addEventListener('click', function(e) {
    if (e.target === this) cerrarModalNueva();
  });
  document.getElementById('modalDetalle').addEventListener('click', function(e) {
    if (e.target === this) cerrarDetalle();
  });
</script>
</body>
</html>
